aid: thymeleaf
name: Thymeleaf
description: >-
  Thymeleaf is a modern server-side Java template engine for both web and
  standalone environments, capable of processing HTML, XML, JavaScript, CSS,
  and plain text. Its primary goal is to bring elegant natural templates to
  development workflows — HTML pages that can be correctly displayed in browsers
  as static prototypes while also working as dynamic server-side templates. With
  over 3,000 GitHub stars, Thymeleaf 3.1 offers deep Spring Framework integration
  via the Spring Standard Dialect using Spring EL, extensive tool support for
  Eclipse and IntelliJ IDEA, and an extensible dialect system. It is widely used
  in Spring Boot web applications as the standard server-side rendering solution.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - HTML
  - Java
  - Open Source
  - Server Side Rendering
  - Spring
